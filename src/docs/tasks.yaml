paths:
  /tasks:
    get:
      summary: Get all tasks
      tags:
        - Tasks
      responses:
        "200":
          description: Tasks list

    post:
      summary: Create task
      tags:
        - Tasks
      responses:
        "201":
          description: Task created

  /tasks/{id}:
    get:
      summary: Get task by ID
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task found